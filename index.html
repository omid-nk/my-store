<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/style.css" />
    <title>My Store</title>
  </head>
  <!-- svgs -->
  <svg class="hidden">
    <symbol
      id="cart"
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24"
      stroke-width="1.5"
      stroke="currentColor"
      class="size-6"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z"
      />
    </symbol>
  </svg>
  <body class="mx-auto max-w-7xl bg-gray-100 p-4">
    <!-- header -->
    <header
      class="mb-4 flex min-h-16 flex-wrap items-center justify-between gap-4 rounded bg-white px-4 shadow-md"
    >
      <h1 class="cursor-default text-2xl font-black text-blue-600">MY STORE</h1>
      <div class="flex items-center gap-4">
        <a href=".\cart.html">
          <svg class="h-6 w-6 cursor-pointer">
            <use href="#cart"></use>
          </svg>
        </a>
      </div>
    </header>
    <!-- main -->
    <main>
      <!-- shop -->
      <section
        id="productsElem"
        class="flex flex-wrap items-stretch justify-center gap-6"
      >
        <!-- import with JS -->
      </section>
      <!-- pagination -->
      <div
        id="paginationElem"
        class="mt-8 flex items-center justify-center gap-1.5"
      >
        <!-- import with JS -->
      </div>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
